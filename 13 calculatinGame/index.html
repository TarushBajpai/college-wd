<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculation game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="base">
        <h1 class = "heading">Guessing Game</h1>
        <div class="countdown"><h1 class="cooldownCount">10</h1></div>
        <button class="startBtn"> Start </button>
        <div class="equationBase"> 
      
            <div class="numBlock"><h2 class="numOne">_</h2></div>
            <div class="opBlock"><h2 class="operator">_</h2></div>
            <div class="numBlock"><h2 class="numTwo">_</h2></div>
        </div>
        
        <input id="inputResult" type="number">
        
        <div >
            <h2 class="result"></h2>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
